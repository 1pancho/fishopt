# /etc/nginx/sites-available/fishopt.pro

server {
    listen 80;
    server_name fishopt.pro www.fishopt.pro;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name fishopt.pro www.fishopt.pro;

    ssl_certificate /etc/letsencrypt/live/fishopt.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fishopt.pro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Next.js frontend
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static files from Next.js — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

server {
    listen 443 ssl http2;
    server_name api.fishopt.pro;

    ssl_certificate /etc/letsencrypt/live/fishopt.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fishopt.pro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # NestJS backend
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS handled by NestJS
        proxy_hide_header Access-Control-Allow-Origin;
    }
}
