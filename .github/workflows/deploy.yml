name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/fishopt
            git config --global --add safe.directory /var/www/fishopt
            git pull origin main

            cd /var/www/fishopt/backend
            npm ci
            ./node_modules/.bin/prisma generate
            ./node_modules/.bin/prisma migrate deploy
            npm run build

            cd /var/www/fishopt
            npm ci
            npm run build

            /home/deploy/.npm-global/bin/pm2 startOrRestart /var/www/fishopt/ecosystem.config.js
            /home/deploy/.npm-global/bin/pm2 save
