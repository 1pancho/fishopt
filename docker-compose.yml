version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fishopt_postgres
    environment:
      POSTGRES_DB: fishopt
      POSTGRES_USER: fishopt
      POSTGRES_PASSWORD: fishopt_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fishopt -d fishopt"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
